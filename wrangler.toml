name = "thrj-processor-service"
main = "src/main.py"
compatibility_date = "2024-12-18"
compatibility_flags = ["python_workers"]

# Set ALLOWED_ORIGINS as an environment variable in the Cloudflare dashboard
# (Workers & Pages → your worker → Settings → Variables and Secrets)
# or via CLI: wrangler secret put ALLOWED_ORIGINS
# Value format: comma-separated origins, e.g. "http://localhost:4173,https://pdf-compressor.thrjtech.com"

# R2 credentials — set these via: wrangler secret put <NAME>
# Required secrets:
#   R2_ENDPOINT_URL      — full R2 S3-compatible endpoint, e.g. https://<account_id>.r2.cloudflarestorage.com
#   R2_ACCESS_KEY_ID     — R2 API token Access Key ID
#   R2_SECRET_ACCESS_KEY — R2 API token Secret Access Key
#   R2_BUCKET_NAME       — R2 bucket name (e.g. pdf-compressor)
